<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.10"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Outer chip body -->
  <rect x="148" y="148" width="216" height="216" rx="20"
        fill="url(#chip)" stroke="white" stroke-opacity="0.35" stroke-width="3"/>

  <!-- Inner chip detail lines (horizontal) -->
  <line x1="186" y1="220" x2="326" y2="220" stroke="white" stroke-opacity="0.18" stroke-width="2"/>
  <line x1="186" y1="256" x2="326" y2="256" stroke="white" stroke-opacity="0.18" stroke-width="2"/>
  <line x1="186" y1="292" x2="326" y2="292" stroke="white" stroke-opacity="0.18" stroke-width="2"/>

  <!-- Pins — LEFT -->
  <rect x="88"  y="192" width="56" height="16" rx="5" fill="white" fill-opacity="0.85"/>
  <rect x="88"  y="248" width="56" height="16" rx="5" fill="white" fill-opacity="0.85"/>
  <rect x="88"  y="304" width="56" height="16" rx="5" fill="white" fill-opacity="0.85"/>
  <!-- Pins — RIGHT -->
  <rect x="368" y="192" width="56" height="16" rx="5" fill="white" fill-opacity="0.85"/>
  <rect x="368" y="248" width="56" height="16" rx="5" fill="white" fill-opacity="0.85"/>
  <rect x="368" y="304" width="56" height="16" rx="5" fill="white" fill-opacity="0.85"/>
  <!-- Pins — TOP -->
  <rect x="192" y="88"  width="16" height="56" rx="5" fill="white" fill-opacity="0.85"/>
  <rect x="248" y="88"  width="16" height="56" rx="5" fill="white" fill-opacity="0.85"/>
  <rect x="304" y="88"  width="16" height="56" rx="5" fill="white" fill-opacity="0.85"/>
  <!-- Pins — BOTTOM -->
  <rect x="192" y="368" width="16" height="56" rx="5" fill="white" fill-opacity="0.85"/>
  <rect x="248" y="368" width="16" height="56" rx="5" fill="white" fill-opacity="0.85"/>
  <rect x="304" y="368" width="16" height="56" rx="5" fill="white" fill-opacity="0.85"/>

  <!-- Lightning bolt (center, white solid) -->
  <path d="M274 172 L224 268 L252 268 L238 340 L312 234 L278 234 Z"
        fill="white" fill-opacity="0.95"/>
</svg>
